<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./Styles/home.css" />

  <script src="./Scripts/getUserReviews.js" defer></script>
  <script src="./Scripts/app.js" defer></script>
  <script src="./Scripts/search.js" defer></script>

  <title>HEARHEAR</title>
</head>

<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-left">
      <img src="./Images/HERE HERE Music Tracker.png" alt="logo">
      <span>HEAR HEAR MUSIC TRACKER </span>
    </div>

    <div class="nav-right">
      <form action="./welcome.html">
        <button id="user-btn">👤</button>
        
      </form>
    </div>
  </nav>

  <!-- MAIN SECTION -->
  <div id="page-sections">

    <!-- FORM -->
    <div id="add-section" class="game-option">
      <form id="movie-form">

        <label>Movie Title</label>
        <input type="text" id="mTitle" />

        <label>Year</label>
        <input type="number" id="mYear" />

        <label>Director</label>
        <input type="text" id="director" />

        <label>Rating</label>
        <input type="number" id="rating" />

        <button type="submit">Submit</button>

      </form>
    </div>

    <!-- SEARCH RESULTS -->
    <div id="search-results">
      <div id="search-prompt">
        📽️ Search for a movie, add it to your collection
      </div>
    </div>

  </div>

  <!-- USER TABLE -->
  <div id="table-container">

    <div id="user-search">
      <input
        id="list-filter"
        type="text"
        placeholder="Search your movies..."
      />
    </div>

    <div id="user-reviews">
      <table>
        <thead>
          <tr>
            <th>Poster</th>
            <th>Name</th>
            <th>Album</th>
            <th>Year</th>
            <th>Your Rating</th>
            <th>External Rating1</th>
            <th>External Rating2</th>
          </tr>
        </thead>
        <tbody id="reviews"></tbody>
      </table>
    </div>

  </div>

</body>
</html>
