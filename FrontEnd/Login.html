<!doctype html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="./Styles/loginsignup.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <script type="module" src="./Scripts/login.js" defer></script>
</head>

<body>
  
<div class="form-container">

  <h1>Sign In</h1>

  <form id="login-form">
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="Password" required>
    </div>

    <p class="forgot-password">
      <a href="forgot-password.html">Forgot Password?</a>
    </p>

    <button type="submit" class="main-btn">Login</button>
  </form>

  <form id="security-question-form" style="display:none;">
    <!-- Dynamic question will appear here -->
    <button type="submit" class="main-btn">Verify</button>
  </form>

  <p class="switch-text">
    Don't have an account?
    <a href="signup.html">Sign Up</a>
  </p>

</div>
</body>
</html>
